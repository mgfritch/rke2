name: Trivy Scan Trigger

# This workflow is triggered when a pull request is labeled with 'scan-with-trivy'.
# It runs under the pull_request event and therefore operates in an unprivileged environment
# with no access to repository secrets or OIDC — this is intentional to support forked PRs.
#
# Policy enforcement is split across two workflows:
#   1. THIS workflow (pull_request): verifies the actor has write permission on the base repo
#      via the default GITHUB_TOKEN (read-only, works on forks), builds the RKE2 image lists,
#      and uploads a pr-context artifact containing pr_number and actor for the follow-up workflow.
#   2. trivy-scan.yaml (workflow_run): runs in the trusted base-repository context where secrets
#      and OIDC are available. It reads the artifact, verifies active rancher org membership via
#      Vault + GitHub App token, and then performs the Trivy scan and posts results back to the PR.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  check-permission:
    if: github.event.label.name == 'scan-with-trivy'
    runs-on: ubuntu-latest
    steps:
      - name: Verify actor has write permissions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { repo, owner } = context.repo;
            const actor = context.actor;
            try {
              const { data: { permission } } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: actor
              });
              if (!['admin', 'maintain', 'write'].includes(permission)) {
                core.setFailed(`User @${actor} does not have write (or higher) permission. Scan can only be triggered by repository collaborators with write access.`);
                return;
              }
            } catch (error) {
              core.setFailed(`Failed to check collaborator permission for ${actor}: ${error.message}`);
              return;
            }

  trigger-scan:
    needs: check-permission
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
        # We don't care about the go version, as we only use it to capture ENV vars
      - name: Install Go
        uses: ./.github/actions/setup-go
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      
      - name: Build RKE2 image lists
        run: |
          SKIP_WINDOWS=true PULL_CMD=echo make build-images
          TAG=$(docker images --format "{{.Repository}}:{{.Tag}} {{.CreatedAt}}" | grep "rancher/rke2-runtime" | sort -k2 -r | head -n1 | awk '{print $1}')
          docker save -o rke2-runtime.tar ${TAG}
      
      - name: Create PR context artifact
        run: |
          mkdir -p pr-context
          echo "${{ github.event.pull_request.number }}" > pr-context/pr_number
          echo "${{ github.actor }}" > pr-context/actor
          mv build/images-core.txt build/images-canal.txt build/images-flannel.txt build/images-ingress-nginx.txt pr-context
          mv rke2-runtime.tar pr-context/rke2-runtime.tar

      - name: Upload PR context artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pr-context-for-scan
          path: pr-context/
          retention-days: 1
